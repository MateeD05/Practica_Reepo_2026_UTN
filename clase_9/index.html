<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <nav class="nav-header">
            <div class="nav-left">
                <div class="logo">
                    <img src="./img/dice-2-fill.svg" alt="logo-hostinger" id="logo">
                </div>
                <div class="nav-bar-items">
                    <a href="" class="nav-item">Pricing</a>
                    <button type="button" class="nav-item">
                        <span>Products</span>
                        <img src="./img/arrow-down-short.svg" alt="short arrow">
                    </button>
                    <button type="button" class="nav-item">
                        <span>Resources</span>
                        <img src="./img/arrow-down-short.svg" alt="short arrow">
                    </button>
                </div>
            </div>
            <div class="nav-bar-buttoms">
                <button type="button" class="nav-special-button">
                    <img src="./img/discord.svg" alt="bot-img">
                    <span>Ask AI</span>
                </button>
                <button type="button" class="nav-button">
                    <img src="./img/globe-americas-fill.svg" alt="map-america">
                    <span>EN</span>
                </button>
                <button type="button" class="nav-button">
                    <img src="./img/person.svg" alt="person-img">
                </button>
            </div>
        </nav>
    </header>
    <main>
        <section>
            <div class="search-area">
                <div class="search-bar">
                    <img src="./img/search.svg" alt="magnifying glass" class="search-item-m">
                    <input type="text" placeholder="          Type the domain you want" class="search-item-i">
                    <button type="button" class="search-item-b">Search</button>
                </div>
                <div class="info-spam">
                    <span>Free domain for 1 year</span>
                    <span>included with <a href="" class="link-search">yearly plans</a></span>
                </div>
            </div>
        </section>
        <section>
            <div class="video-major">
                <div class="text-over-video">
                    <h1 class="text-major">Your online success starts<br> here</h1>
                    <span class="span-major">From launching a website to growing your business,Hostinger's got<br> you covered.</span>
                    <button type="button" class="start-button">Start now</button>
                    <span class="span-second"><img src="./img/shield-check.svg" alt="shield-check"> 30-day money-back guarantee</span>
                </div>
                <div class="button-video">
                    <button type="button" class="button-stop">
                        <img src="./img/pause-circle.svg" alt="stop button">
                    </button>
                </div>
                <div class="div-video">
                    <video src="./video/default.mp4" autoplay loop muted playsinline class="video"></video>
                </div>
            </div>    
        </section>
    </main>
</body>
</html>
